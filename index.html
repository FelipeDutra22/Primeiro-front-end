<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Spotfy></title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="titulo">Music App</h1>
    </header>
    <hr width="100%">
    <main>
        <section class="main__apps__opcao">
            <a class="main__facebook" href="#">
                <img src="/assets/svg.png" alt="icone do facebook">
                Continue with Facebook
            </a>
            <a class="main__apple" href="#">
                <img src="/assets/apple.png" alt="icone da apple">
                Continue with Apple
            </a>
        </section>
        <hr width="450px">
        <section class="main__inputs">
            <form class="main__form">
                <div class="main__form__div">
                    <label class="main__form__div__label"> Email address or username</label>
                    <input placeholder="Email address or username" type="email">
                </div>
                <div class="main__form__div">
                    <label class="main__form__div__label"> Password</label>
                    <input placeholder="Password" type="password">
                </div>
                </form>
        </section>
        <section class="main__forgot__button">
            <a class="main__forgot__password" href="#">Forgot your password?</a>
            <button type="submit">LOG IN</button>
        </section>
        <hr width="450px">
        <section class="main__not__account">
            <p class="main__not__account__p">Don't have an account?</p>
            <a class="main__sigin__button" href="#">Sign up for Music app</a>
        </section>
    </main>
</body>
</html>
